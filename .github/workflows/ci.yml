name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        cc: [gcc, clang]
        exclude:
          - os: macos-latest
            cc: gcc
    steps:
      - uses: actions/checkout@v4
      - name: Build and run tests
        env:
          CC: ${{ matrix.cc }}
        run: make run-all
